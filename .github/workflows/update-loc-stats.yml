name: Update LOC Stats

on:
  schedule:
    - cron: '0 3 * * *'  # Daily at 3 AM UTC
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  update-loc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pygithub

      - name: Count LOC and generate SVG
        env:
          GITHUB_USERNAME: jlaportebot
          OUTPUT_DIR: .
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/loc_counter.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add loc-stats.svg loc-stats.json
          git diff --cached --quiet || git commit -m "chore: update LOC stats [skip ci]"
          git push
