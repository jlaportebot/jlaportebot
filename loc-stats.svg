<svg xmlns="http://www.w3.org/2000/svg" width="900" height="180" viewBox="0 0 900 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="180" rx="12" fill="url(#bg)" stroke="#30363d" stroke-width="1"/>
  
  <!-- Title -->
  <text x="30" y="38" fill="#f0f6fc" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="18" font-weight="600">📝 Lifetime Lines of Code</text>
  <text x="870" y="38" fill="#8b949e" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" text-anchor="end">by @jlaportebot</text>
  
  <!-- Lines Added -->
  <rect x="30" y="58" width="250" height="90" rx="8" fill="#0d1117" stroke="#238636" stroke-width="1"/>
  <text x="155" y="85" fill="#3fb950" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" text-anchor="middle" font-weight="500">Lines Added</text>
  <text x="155" y="125" fill="#f0f6fc" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="36" text-anchor="middle" font-weight="700">67.8K</text>
  
  <!-- Lines Removed -->
  <rect x="300" y="58" width="250" height="90" rx="8" fill="#0d1117" stroke="#da3633" stroke-width="1"/>
  <text x="425" y="85" fill="#f85149" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" text-anchor="middle" font-weight="500">Lines Removed</text>
  <text x="425" y="125" fill="#f0f6fc" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="36" text-anchor="middle" font-weight="700">2.1K</text>
  
  <!-- Net Lines -->
  <rect x="570" y="58" width="300" height="90" rx="8" fill="#0d1117" stroke="#1f6feb" stroke-width="1"/>
  <text x="720" y="85" fill="#58a6ff" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" text-anchor="middle" font-weight="500">Net Lines (Added − Removed)</text>
  <text x="720" y="125" fill="#f0f6fc" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="36" text-anchor="middle" font-weight="700">65.7K</text>
  
  <!-- Footer -->
  <text x="30" y="168" fill="#8b949e" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="11">Across 70 merged pull requests • Updated May 30, 2026</text>
</svg>